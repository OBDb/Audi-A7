generations:
  - name: "First Generation (4G)"
    start_year: 2010
    end_year: 2014
    description: "The original Audi A7 pioneered the 'four-door coupe' concept in Audi's lineup, featuring a distinctive fastback design with a practical liftback tailgate. Based on the MLB platform shared with the A6, it combined elegant, flowing lines with a sporty, low-slung profile. The interior featured premium materials and advanced technology including Audi's MMI system. Engine options mirrored the A6 lineup with V6 and V8 petrol and diesel options, while the S7 featured a twin-turbo V8 and the RS7 offered significant performance. The first-generation A7 was released in autumn 2010 and became the first fastback in the Audi C-platform series since the C2 Audi 100."

  - name: "First Generation (4G) 2015 Facelift"
    start_year: 2015
    end_year: 2018
    description: "Audi unveiled the 2015 A7 facelift in May 2014, bringing visual and technical updates to the original design. The facelift included updated styling elements, refined MMI system features, and the introduction of Audi Connect telematics with 4G mobile internet and map updates. The interior was refreshed with new materials and controls. Engine options continued with petrol and diesel variants, and the S7 and RS7 performance models were updated with the RS7 Performance variant offering up to 605 HP. This facelift maintained the core fastback character while modernizing the vehicle's technology and styling."

  - name: "Second Generation (4K)"
    start_year: 2018
    end_year: null
    description: "Built on the MLB Evo platform, the second-generation A7 features more angular styling while maintaining the distinctive fastback silhouette. Revealed in October 2017 and officially launched in Germany in February 2018, this generation represents a comprehensive redesign. The interior features a dual-touchscreen MMI system and Audi's Virtual Cockpit digital instrument cluster as standard. Engine options include 2.0L and 3.0L turbocharged petrol engines, along with 2.0L and 3.0L diesel variants, all equipped with mild-hybrid (MHEV) 48-volt technology for improved efficiency. The range includes performance-oriented S7 and RS7 Sportback variants. Advanced driver assistance systems and a more digitized interface position the A7 as a technology leader. An extended-wheelbase variant called the A7L was launched in China in 2021."
